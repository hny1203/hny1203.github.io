const gD=(f,c,p)=>[...new Set(RATES.filter(r=>r.f===f&&r.c===c&&r.p===p).map(r=>r.d))];
const gR=(f,c,p,d)=>{const x=RATES.find(r=>r.f===f&&r.c===c&&r.p===p&&r.d===d);return x?x.r:null;};

const calc=(row)=>{
  const m=+row.mpd||0,d=+row.dpw||0,w=+row.wpm||0,fe=+row.fee||0;
  const wk=m*d,mo=Math.round(wk*w*10)/10;
  const pm=mo>0?fe/mo:0;
  const std=gR(row.f,row.c,row.p,row.d);
  const ok=row.f&&row.c&&row.p&&row.d&&m>0&&d>0&&w>0&&fe>0;
  const st=ok&&std!==null?(pm<=std?"적정":"초과"):null;
  return{wk,mo,pm:Math.round(pm*100)/100,std,st,ok};
};

              <table style={S.pvTable}><thead><tr style={{background:"#e8eef7"}}>
                <th style={S.th2}>교습과정</th><th style={S.th2}>교습과목</th><th style={S.th2}>교습대상</th><th style={S.th2}>정원</th><th style={S.th2}>교습비</th>
              </tr></thead><tbody>
                {existingRows.map(r=>(
                  <tr key={r.id} style={{textDecoration:mode==="기존삭제"?"line-through":"none",color:mode==="기존삭제"?"#bbb":"#222"}}>
                    <td style={S.td2}>{r.p}</td><td style={S.td2}>{r.nm}</td><td style={S.td2}>{r.d}</td><td style={S.td2}>{r.cap}명</td><td style={S.td2}>{fmt(+r.fee)}원</td>
                  </tr>
                ))}
              </tbody></table>
            </div>
          )}
          {mode==="일부수정"&&delRows.length>0&&(
            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,fontWeight:700,color:"#c0392b",marginBottom:4}}>[삭제] 교습과정</div>
              <table style={S.pvTable}><thead><tr style={{background:"#fde8e8"}}>
                <th style={S.th2}>교습과정</th><th style={S.th2}>교습과목</th><th style={S.th2}>교습대상</th>
              </tr></thead><tbody>
                {delRows.map(r=>(<tr key={r.id} style={{textDecoration:"line-through",color:"#bbb"}}><td style={S.td2}>{r.p}</td><td style={S.td2}>{r.nm}</td><td style={S.td2}>{r.d}</td></tr>))}
              </tbody></table>
            </div>
          )}
          <div style={{fontSize:12,fontWeight:700,color:"#1a4b8c",marginBottom:4}}>[{mode==="일부수정"?"변경·추가":"신규"}] 교습과정</div>
          <div style={{overflowX:"auto"}}>
            <table style={S.pvTable}><thead><tr style={{background:"#d4dde9"}}>
              {mode==="일부수정"&&<th style={S.th2}>구분</th>}
              <th style={S.th2}>교습과정</th><th style={S.th2}>교습과목</th><th style={S.th2}>교습대상</th><th style={S.th2}>정원</th>
              <th style={S.th2}>주총시간①</th><th style={S.th2}>월총시간②</th><th style={S.th2}>분당단가③</th><th style={S.th2}>교습비④</th><th style={S.th2}>판정</th>
            </tr></thead><tbody>
              {liveRows.map(r=>{const rc=calc(r);return(
                <tr key={r.id}>
                  {mode==="일부수정"&&<td style={{...S.td2,fontWeight:600,color:r.tp==="변경"?"#1a4b8c":"#27ae60"}}>{r.tp}</td>}
                  <td style={S.td2}>{r.p}</td><td style={S.td2}>{r.nm}</td><td style={S.td2}>{r.d}</td><td style={S.td2}>{r.cap}명</td>
                  <td style={S.td2}>{fmt(rc.wk)}분</td><td style={S.td2}>{fmt(rc.mo)}분</td>
                  <td style={S.td2}>{rc.pm.toFixed(2)}원</td>
                  <td style={{...S.td2,fontWeight:700}}>{fmt(+r.fee)}원</td>
                  <td style={{...S.td2,color:rc.st==="적정"?"#27ae60":"#c0392b",fontWeight:700}}>{rc.st}</td>
                </tr>
              );})}
            </tbody></table>
          </div>
        </div>

        <div style={{textAlign:"center",padding:"16px 0"}}>
          <label style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,cursor:"pointer",fontSize:15}}>
            <input type="checkbox" checked={signed} onChange={e=>setSigned(e.target.checked)} style={{width:20,height:20}}/>
            <span>위 내용이 사실과 다름없음을 확인하며, 전자서명합니다.</span>
          </label>
          <div style={{marginTop:6,fontSize:12,color:"#888"}}>신청인({type==="academy"?"학원설립·운영자":"교습자"}): {info.ownerName} (전자서명)</div>
          <div style={{marginTop:6,fontSize:12,color:"#888"}}>{OFFICES.find(o=>o.id===office)?.name} 교육장 귀하</div>
        </div>
        <div style={{textAlign:"center",marginTop:8}}>
          <button disabled={!signed} onClick={()=>setSubmitted(true)} style={signed?S.submitBtn:S.submitBtnOff}>
            {signed?"온라인 제출하기":"전자서명 후 제출 가능합니다"}
          </button>
        </div>
      </div>
    );
  };

  // ════════════════════════════════════════
  // STEP 5: 서류 출력
  // ════════════════════════════════════════
  const renderStep5=()=>{
    const tabs=[type==="academy"?"변경등록 신청서":"변경신고서","교습비 내역서","교습비등 게시표","반환기준"];
    const tpLabel=type==="academy"?"학원":"교습소";
    return(
      <div style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div style={S.cardTitle}>서류 출력 및 다운로드</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <button onClick={()=>downloadWord("신청서")} style={S.dlBtn}>📄 {tabs[0]} 다운로드(.doc)</button>
            <button onClick={()=>downloadWord("내역서")} style={S.dlBtn}>📄 내역서 다운로드(.doc)</button>
          </div>
        </div>
        <p style={{fontSize:12,color:"#666",margin:"0 0 16px"}}>Word(.doc) 다운로드 후 편집하거나, 브라우저 인쇄(Ctrl+P)로 PDF 저장할 수 있습니다.</p>

        <div style={{display:"flex",gap:0,borderBottom:"2px solid #1a4b8c",marginBottom:16,overflowX:"auto"}}>
          {tabs.map((t,i)=><button key={i} onClick={()=>setDocTab(i)} style={docTab===i?S.tabActive:S.tab}>{t}</button>)}
        </div>

        {docTab===0&&(
          <div style={S.doc}>
            <div style={S.docH}>{tpLabel} 교습비등 [{mode==="기존삭제"?"신규":"변경"}]{type==="academy"?"등록신청서":"신고서"}</div>
            <table style={S.docT}><tbody>
              <tr><td style={S.dth} rowSpan={2}>신청인</td><td style={S.dth}>이름</td><td style={S.dtd}>{info.ownerName}</td><td style={S.dth}>생년월일</td><td style={S.dtd}>{info.birth}</td></tr>
              <tr><td style={S.dth}>주소</td><td style={S.dtd} colSpan={3}>{info.addr||info.loc}</td></tr>
              <tr><td style={S.dth} rowSpan={2}>신청내용</td><td style={S.dth}>{tpLabel}명</td><td style={S.dtd}>{info.nm}</td><td style={S.dth}>{type==="academy"?"등록번호":"신고번호"}</td><td style={S.dtd}>{info.reg}</td></tr>
              <tr><td style={S.dth}>위치</td><td style={S.dtd} colSpan={3}>{info.loc}</td></tr>
              <tr><td style={S.dth}>변경사유</td><td style={S.dtd} colSpan={4}>교습비 변경 ({mode})</td></tr>
            </tbody></table>
            <div style={{textAlign:"center",margin:"24px 0 8px",fontSize:13,lineHeight:1.8}}>
              「학원의 설립·운영 및 과외교습에 관한 법률」 제{type==="academy"?"6":"14"}조에 따라<br/>위와 같이 {type==="academy"?"변경등록을 신청":"변경 신고를"} 합니다.
            </div>
            <div style={{textAlign:"center",fontSize:13,margin:"16px 0"}}>2026년 &nbsp;&nbsp;3월 &nbsp;&nbsp;20일</div>
            <div style={{textAlign:"center",fontSize:13}}>신청인({type==="academy"?"학원설립·운영자":"교습자"}): {info.ownerName} &nbsp;(전자서명)</div>
            <div style={{textAlign:"center",fontSize:13,marginTop:12,color:"#555"}}>{OFFICES.find(o=>o.id===office)?.name} 교육장 귀하</div>
          </div>
        )}

        {docTab===1&&(
          <div style={S.doc}>
            <div style={S.docH}>교습비 등 내역서</div>
            <div style={{fontSize:13,marginBottom:12}}>{tpLabel}명: {info.nm}</div>
            {mode!=="일부수정"&&existingRows.length>0&&(
              <div style={{marginBottom:16}}>
                <div style={{fontSize:12,fontWeight:700,color:mode==="기존삭제"?"#c0392b":"#555",marginBottom:4}}>□ 기존 교습비 ({mode==="기존삭제"?"삭제":"유지"})</div>
                <table style={S.docT}><thead><tr style={{background:"#e8e8e8"}}>
                  <th style={S.dth2}>교습과정</th><th style={S.dth2}>교습과목</th><th style={S.dth2}>교습대상</th><th style={S.dth2}>정원</th><th style={S.dth2}>주총시간①</th><th style={S.dth2}>월총시간②</th><th style={S.dth2}>분당단가③</th><th style={S.dth2}>교습비④</th>
                </tr></thead><tbody>
                  {existingRows.map(r=>{const rc=calc(r);return(
                    <tr key={r.id} style={{textDecoration:mode==="기존삭제"?"line-through":"none",color:mode==="기존삭제"?"#999":"#222"}}>
                      <td style={S.dtd2}>{r.p}</td><td style={S.dtd2}>{r.nm}</td><td style={S.dtd2}>{r.d}</td><td style={S.dtd2}>{r.cap}</td>
                      <td style={S.dtd2}>{r.mpd}×{r.dpw}</td><td style={S.dtd2}>{fmt(rc.mo)}</td><td style={S.dtd2}>{rc.pm.toFixed(2)}</td><td style={{...S.dtd2,fontWeight:700}}>{fmt(+r.fee)}</td>
                    </tr>
                  );})}
                </tbody></table>
              </div>
            )}
            <div style={{fontSize:12,fontWeight:700,color:"#1a4b8c",marginBottom:4}}>□ {mode==="일부수정"?"변경 내역":"신규 교습과정"}</div>
            <div style={{overflowX:"auto"}}>
              <table style={S.docT}><thead><tr style={{background:"#d4dde9"}}>
                {mode==="일부수정"&&<th style={S.dth2}>구분</th>}
                <th style={S.dth2}>교습과정</th><th style={S.dth2}>교습과목</th><th style={S.dth2}>교습대상</th><th style={S.dth2}>정원</th>
                <th style={S.dth2}>주총교습시간①<br/><span style={{fontWeight:400,fontSize:10}}>(하루분×주회)</span></th>
                <th style={S.dth2}>월총교습시간②<br/><span style={{fontWeight:400,fontSize:10}}>(①×{editRows[0]?.wpm||"4.2"}주)</span></th>
                <th style={S.dth2}>분당단가③<br/><span style={{fontWeight:400,fontSize:10}}>(④÷②)</span></th>
                <th style={S.dth2}>교습비④</th>
              </tr></thead><tbody>
                {editRows.map(r=>{const rc=calc(r);const isDel=r.tp==="삭제";return(
                  <tr key={r.id} style={{textDecoration:isDel?"line-through":"none",color:isDel?"#999":"#222"}}>
                    {mode==="일부수정"&&<td style={S.dtd2}>{r.tp}</td>}
                    <td style={S.dtd2}>{r.p}</td><td style={S.dtd2}>{r.nm}</td><td style={S.dtd2}>{r.d}</td><td style={S.dtd2}>{r.cap}</td>
                    <td style={S.dtd2}>{isDel?"-":`${r.mpd}×${r.dpw}`}</td>
                    <td style={S.dtd2}>{isDel?"-":fmt(rc.mo)}</td>
                    <td style={S.dtd2}>{isDel?"-":rc.pm.toFixed(2)}</td>
                    <td style={{...S.dtd2,fontWeight:700}}>{isDel?"-":`${fmt(+r.fee)}원`}</td>
                  </tr>
                );})}
              </tbody></table>
            </div>
          </div>
        )}

        {docTab===2&&(
          <div style={S.doc}>
            <div style={S.docH}>교습비등 게시표</div>
            <div style={{fontSize:13,marginBottom:12}}>{tpLabel}명: {info.nm}&nbsp;&nbsp;|&nbsp;&nbsp;{type==="academy"?"등록번호":"신고번호"}: {info.reg}</div>
            <table style={S.docT}><thead><tr style={{background:"#d4dde9"}}>
              <th style={S.dth2}>교습과정</th><th style={S.dth2}>교습과목</th><th style={S.dth2}>교습대상</th><th style={S.dth2}>정원</th><th style={S.dth2}>교습비(월)</th>
            </tr></thead><tbody>
              {liveRows.map(r=>(
                <tr key={r.id}><td style={S.dtd2}>{r.p}</td><td style={S.dtd2}>{r.nm}</td><td style={S.dtd2}>{r.d}</td><td style={S.dtd2}>{r.cap}명</td><td style={{...S.dtd2,fontWeight:700}}>{fmt(+r.fee)}원</td></tr>
              ))}
            </tbody></table>
            <div style={{marginTop:16,fontSize:12,color:"#666",textAlign:"center"}}>게시일: 2026년 3월 20일</div>
          </div>
        )}

        {docTab===3&&(
          <div style={S.doc}>
            <div style={S.docH}>교습비 반환기준</div>
            <div style={{fontSize:12,color:"#666",marginBottom:12}}>학원의 설립·운영 및 과외교습에 관한 법률 시행령 [별표 4]</div>
            <table style={S.docT}><thead><tr style={{background:"#d4dde9"}}><th style={S.dth2} colSpan={2}>구분</th><th style={S.dth2}>반환금액</th></tr></thead><tbody>
              <tr><td style={S.dtd2} colSpan={2}>교습을 할 수 없거나 교습장소 제공 불가</td><td style={S.dtd2}>이미 납부한 교습비등의 전액</td></tr>
              <tr><td style={S.dtd2} rowSpan={4}>교습기간<br/>1개월 이내</td><td style={S.dtd2}>교습 시작 전</td><td style={S.dtd2}>이미 납부한 교습비등의 전액</td></tr>
              <tr><td style={S.dtd2}>총 교습시간의 1/3 경과 전</td><td style={S.dtd2}>이미 납부한 교습비등의 2/3 해당액</td></tr>
              <tr><td style={S.dtd2}>총 교습시간의 1/2 경과 전</td><td style={S.dtd2}>이미 납부한 교습비등의 1/2 해당액</td></tr>
              <tr><td style={S.dtd2}>총 교습시간의 1/2 경과 후</td><td style={S.dtd2}>반환하지 아니함</td></tr>
              <tr><td style={S.dtd2} colSpan={2}>교습기간 1개월 초과</td><td style={S.dtd2}>반환사유 발생 해당 월의 반환대상 교습비(위 기준 준용) + 나머지 월의 교습비 전액</td></tr>
            </tbody></table>
            <div style={{marginTop:16,fontSize:12,color:"#666",textAlign:"center"}}>{tpLabel}명: {info.nm}</div>
          </div>
        )}
      </div>
    );
  };

  const stepContent=[renderStep0,renderStep1,renderStep2,renderStep3,renderStep4,renderStep5];

  return(
    <div style={S.wrap}>
      <style>{`
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:#eef1f6}
        select:focus,input:focus{outline:none;border-color:#1a4b8c;box-shadow:0 0 0 2px rgba(26,75,140,.15)}
        @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        ::-webkit-scrollbar{height:6px}::-webkit-scrollbar-thumb{background:#bbb;border-radius:3px}
      `}</style>

      <div style={S.header}>
        <div style={S.headerInner}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={S.logo}>NEIS</div>
            <div>
              <div style={{fontSize:11,opacity:.7}}>나이스 대국민서비스</div>
              <div style={{fontSize:16,fontWeight:700,letterSpacing:1}}>학원·교습소 교습비 온라인 변경 신청</div>
            </div>
          </div>
          <div style={{fontSize:11,opacity:.6}}>프로토타입 시연 데모 v2.0</div>
        </div>
      </div>

      <div style={S.stepBar}>
        <div style={S.stepInner}>
          {STEPS.map((s,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:0}}>
              <div onClick={()=>{if(i<step){setStep(i);setSubmitted(false);}}} style={{display:"flex",alignItems:"center",gap:6,cursor:i<step?"pointer":"default"}}>
                <div style={i===step?S.scActive:i<step?S.scDone:S.sc}>{i<step?"✓":i+1}</div>
                <span style={{fontSize:12,color:i===step?"#1a4b8c":i<step?"#27ae60":"#999",fontWeight:i===step?700:400,whiteSpace:"nowrap"}}>{s}</span>
              </div>
              {i<STEPS.length-1&&<div style={{width:24,height:1,background:i<step?"#27ae60":"#ccc",margin:"0 4px"}}/>}
            </div>
          ))}
        </div>
      </div>

      <div style={S.content}>
        <div style={{animation:"fadeIn .3s ease"}} key={step}>{stepContent[step]()}</div>
      </div>

      {!(step===4&&submitted)&&(
        <div style={S.navBar}>
          <div style={S.navInner}>
            {step>0&&step<5&&<button onClick={()=>{setStep(step-1);setSubmitted(false);}} style={S.backBtn}>← 이전</button>}
            <div style={{flex:1}}/>
            {step<5&&step!==4&&<button disabled={!canNext()} onClick={()=>setStep(step+1)} style={canNext()?S.primaryBtn:S.primaryBtnOff}>다음 →</button>}
            {step===5&&<button onClick={()=>{setStep(0);setSubmitted(false);setSigned(false);setEditRows([blankRow(1)]);setExistingRows([]);setInfo({});}} style={S.backBtn}>처음으로</button>}
          </div>
        </div>
      )}
    </div>
  );
}

const S={
  wrap:{fontFamily:"'Malgun Gothic','맑은 고딕',-apple-system,sans-serif",minHeight:"100vh",background:"#eef1f6",color:"#222"},
  header:{background:"linear-gradient(135deg,#0d2f5c 0%,#1a4b8c 50%,#2a6cb8 100%)",color:"#fff",borderBottom:"3px solid #f0c040"},
  headerInner:{maxWidth:1200,margin:"0 auto",padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"},
  logo:{background:"#fff",color:"#1a4b8c",fontWeight:900,fontSize:18,padding:"4px 10px",borderRadius:4,letterSpacing:2},
  stepBar:{background:"#fff",borderBottom:"1px solid #d4dde9",overflowX:"auto"},
  stepInner:{maxWidth:1200,margin:"0 auto",padding:"12px 20px",display:"flex",alignItems:"center",gap:4,minWidth:700},
  sc:{width:24,height:24,borderRadius:12,background:"#e0e0e0",color:"#999",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,flexShrink:0},
  scActive:{width:24,height:24,borderRadius:12,background:"#1a4b8c",color:"#fff",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,flexShrink:0},
  scDone:{width:24,height:24,borderRadius:12,background:"#27ae60",color:"#fff",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,flexShrink:0},
  content:{maxWidth:1200,margin:"0 auto",padding:"20px 20px 100px"},
  card:{background:"#fff",borderRadius:8,border:"1px solid #d4dde9",padding:"24px",marginBottom:16,boxShadow:"0 1px 4px rgba(0,0,0,.06)"},
  cardTitle:{fontSize:17,fontWeight:700,color:"#1a4b8c",marginBottom:16,paddingBottom:10,borderBottom:"2px solid #1a4b8c"},
  grid2:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px 20px"},
  fg:{marginBottom:12},
  label:{display:"block",fontSize:13,fontWeight:600,color:"#444",marginBottom:4},
  sel:{width:"100%",padding:"8px 10px",border:"1px solid #c5d0de",borderRadius:4,fontSize:13,background:"#fff"},
  inp:{width:"100%",padding:"8px 10px",border:"1px solid #c5d0de",borderRadius:4,fontSize:13,background:"#fff"},
  hint:{fontSize:12,color:"#27ae60",marginTop:6},
